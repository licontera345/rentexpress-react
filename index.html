<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="RentExpress: alquiler de vehículos. Reserva tu coche online, compara precios y gestiona tus reservas y alquileres de forma sencilla." />
    <meta name="theme-color" content="#0f172a" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
    <title>RentExpress – Alquiler de vehículos</title>
    <style>
      /* Solo pantalla de carga inicial: no afecta a la app (React reemplaza #root y este markup desaparece) */
      .re-initial-loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Plus Jakarta Sans', 'Segoe UI', system-ui, sans-serif; background: #f8fafc; color: #1e293b; text-align: center; padding: 2rem; }
      .re-initial-loading header { margin-bottom: 1.5rem; }
      .re-initial-loading h1 { font-size: clamp(1.5rem, 4vw, 2rem); font-weight: 700; letter-spacing: -0.02em; margin: 0; }
      .re-initial-loading main { display: flex; flex-direction: column; align-items: center; gap: 1rem; }
      .re-initial-loading .loading-text { font-size: 1rem; color: #64748b; margin: 0; }
      .re-initial-loading .loading-spinner { width: 32px; height: 32px; border: 3px solid #e2e8f0; border-top-color: #0ea5e9; border-radius: 50%; animation: re-spin 0.8s linear infinite; }
      @keyframes re-spin { to { transform: rotate(360deg); } }
      html[data-theme="dark"] .re-initial-loading { background: #0f172a; color: #e2e8f0; }
      html[data-theme="dark"] .re-initial-loading h1 { color: #f8fafc; }
      html[data-theme="dark"] .re-initial-loading .loading-text { color: #94a3b8; }
      html[data-theme="dark"] .re-initial-loading .loading-spinner { border-color: #1e293b; border-top-color: #38bdf8; }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="re-initial-loading">
        <header>
          <h1>RentExpress – Alquiler de vehículos</h1>
          <nav aria-label="Principal"></nav>
        </header>
        <main id="main-content" tabindex="-1">
          <div class="loading-spinner" aria-hidden="true"></div>
          <p class="loading-text">Cargando…</p>
        </main>
        <footer></footer>
      </div>
    </div>
    <script>
      (function() {
        var key = 'rentexpress-theme';
        var stored = localStorage.getItem(key);
        var theme = 'dark';
        if (stored === 'light' || stored === 'dark') theme = stored;
        else if (typeof window.matchMedia !== 'undefined' && window.matchMedia('(prefers-color-scheme: light)').matches) theme = 'light';
        document.documentElement.dataset.theme = theme;
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
